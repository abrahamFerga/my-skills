name: CD App (App Service)

# Builds the .NET app and deploys it to Azure App Service via GitHub OIDC.
# Runs after infra exists. Trigger on push to main, or manually for a chosen
# environment. No publish profile / secret is stored -- auth is federated.

on:
  push:
    branches: [main]
    paths-ignore: ["infra/**", "**/*.md"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, prod]
        default: prod

permissions:
  id-token: write
  contents: read

env:
  DOTNET_NOLOGO: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  WEB_PROJECT: src/Api/Api.csproj

jobs:
  build:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (pinned by global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish
        run: >
          dotnet publish ${{ env.WEB_PROJECT }}
          --configuration Release
          --output ${{ github.workspace }}/publish

      - name: Upload published app
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ${{ github.workspace }}/publish
          if-no-files-found: error

  deploy:
    name: Deploy to App Service
    needs: build
    runs-on: ubuntu-latest
    # Environment gate: required reviewers + the env's vars (e.g. the web app
    # name) live here. Defaults to prod for push; honors the dispatch input.
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - name: Download published app
        uses: actions/download-artifact@v4
        with:
          name: app
          path: ${{ github.workspace }}/publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          # AZURE_WEBAPP_NAME is an environment variable in GitHub, set from the
          # Terraform output `web_app_name`. Keeps the app name out of source.
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ github.workspace }}/publish

      - name: Logout
        if: always()
        run: az logout || true
